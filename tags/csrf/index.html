   -> Page / Post 取消 sidebar + 修正偏移 + 修正 footer
========================================================= */

/* 1) Page / Post：直接隱藏 sidebar */
body.page-template .sidebar,
body.post-template .sidebar{
  display: none !important;
}

/* 2) Page / Post：把兩欄 grid 改成一欄，避免主欄卡在第2欄造成左邊大留白 */
body.page-template .main-content,
body.post-template .main-content{
  grid-template-columns: 1fr !important;
  grid-column-gap: 0 !important;
}

/* 3) Page / Post：主內容強制吃滿整列（覆蓋 theme 在大螢幕時給的 grid-column: 2/3） */
body.page-template .main,
body.post-template .main{
  grid-column: 1 / -1 !important;
  max-width: 100% !important;
  margin: 0 auto !important;
}

/* 4) Page / Post：把內容區塊可能被 theme 加的左右 margin 清掉（避免看起來又偏） */
body.page-template .content,
body.post-template .content,
body.page-template .content__entry,
body.post-template .content__entry{
  margin-left: 0 !important;
  margin-right: 0 !important;
}

/* 5) Page / Post：footer 強制回到正常全寬、不要被當成側欄寬度、也不要跑到右邊 */
body.page-template .footer,
body.post-template .footer{
  width: 100% !important;
  max-width: none !important;
  margin: 0 !important;
  grid-column: 1 / -1 !important;
  clear: both;
}

/* 6) （保險）如果 TechNews 用 CSS 變數控制欄寬，Page / Post 也一起歸零 */
body.page-template,
body.post-template{
  --sidebar-width: 0;
  --main-col-width: 100%;
